<!DOCTYPE html>
<html>
    <head>
        <title>Professor Homepage</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <h1>ACME University</h1>

        <h2>Update Student Grades</h2>
        <div class = "tableWrap">
            <div class="listButtons">
                <form action="{{ url_for('teacher_home') }}" method="get">
                    <button type="submit">Refresh</button>
                </form>
                <form action="{{ url_for('logout') }}" method="get">
                    <button type="submit">Sign out</button>
                </form>
            </div>

            <!--Table Display-->
            <table class="Gradebook">
                <thead>
                <tr>
                    <th>Course</th>
                    <th>Teacher</th>
                    <th>Student</th>
                    <th>Grade</th>
                </tr>
                </thead>

                <tbody>
                    {% for row in rows %}
                    <tr>
                        <td>{{ row.course_name }}</td>
                        <td>{{ row.teacher_name }}</td>
                        <td>{{ row.student_name }}</td>
                        <td>
                            {% if row.enrollment_id %}
                            <form action="{{ url_for('update_teacher_grade', enrollment_id=row.enrollment_id) }}" method="post" class="gradeEditForm">
                                <input class="gradeInput" type="number" name="grade" value="{{ row.grade if row.grade is not none else '' }}" min="0" max="100">
                                <button class="tableButtons" type="submit">Save</button>
                            </form>
                            {% else %}
                            {{ row.grade }}
                            {% endif %}
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" style="text-align: center;">No students enrolled in your classes.</td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </div>

    </body>
</html>
