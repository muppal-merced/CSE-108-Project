<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="lobby-page">
  <main class="lobby-shell">
    <section class="lobby-hero">
      <p class="eyebrow">Signed in as {{ username }}</p>
      <h1>Create or join a lobby</h1>
      <p>Invite or join another player and start your 1v1 Wor2le match.</p>
    </section>

    <section class="lobby-card">
      <div class="lobby-block">
        <h2>Create Lobby</h2>
        <p>Start a private room and share the code with your opponent.</p>
        <form class="lobby-form" method="post" action="{{ url_for('create_lobby') }}">
          <button type="submit" class="lobby-button">Create New Lobby</button>
        </form>
      </div>

      <div class="lobby-divider">or</div>

      <div class="lobby-block">
        <h2>Join Lobby</h2>
        <p>Enter a room code to join a friend's match.</p>
        <form class="lobby-form" method="post" action="{{ url_for('join_lobby') }}">
          <input type="text" name="room_code" placeholder="Room code" maxlength="8" required>
          <button type="submit" class="lobby-button">Join Lobby</button>
        </form>
      </div>

      <a class="logout-link" href="{{ url_for('logout') }}">Log out</a>
    </section>
  </main>
</body>
</html>
