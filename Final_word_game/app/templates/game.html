<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wor2le Game</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
</head>

<body class="game-page">
  <main class="game-shell">

    <!-- UI -->
    <h1>Wor2le Duel</h1>

    <div>
      <p>Lobby: {{ lobby.code }}</p>
      <p>Playing as: {{ username }}</p>
    </div>

    <div>
      <h3>Your Guesses</h3>
      <div id="playerGuessGrid"></div>
    </div>

    <div>
      <h3>Opponent Guesses</h3>
      <div id="opponentGuessGrid"></div>
    </div>

    <div>
      <input id="guessInput" type="text" placeholder="Enter guess">
      <button id="guessBtn">Guess</button>
    </div>

    <button id="pauseBtn">Pause</button>

  </main>

  <!-- pass data to Flask -->
<script>
  window.GAME_CONFIG = {
    lobbyCode: {{ lobby.code | tojson }},
    username: {{ username | tojson }},
    userId: {{ session.user_id | tojson }},

    player1Id: {{ (game.player1_id if game and game.player1 else none) | tojson }},
    player2Id: {{ (game.player2_id if game and game.player2 else none) | tojson }},

    player1Name: {{ (game.player1.username if game and game.player1 else "Player 1") | tojson }},
    player2Name: {{ (game.player2.username if game and game.player2 else "Player 2") | tojson }},

    wordLength: {{ (game.word_length if game else 5) | tojson }},
    gameState: {{ (game.status if game else "waiting") | tojson }},
    currentTurn: {{ (game.current_turn if game else 1) | tojson }},

    player1Word: {{ (game.player1_word if game else "") | tojson }},
    player2Word: {{ (game.player2_word if game else "") | tojson }},

    player1Guesses: {{ (game.player1_guesses if game and game.player1_guesses else []) | tojson }},
    player2Guesses: {{ (game.player2_guesses if game and game.player2_guesses else []) | tojson }},

    player1Score: {{ (game.player1_score if game else 0) | tojson }},
    player2Score: {{ (game.player2_score if game else 0) | tojson }}
  };
</script>

  <!-- load JS-->
  <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
